<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTENT STRATEGY OPTIMIZATION</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #FFFFFF;
      color: #000000;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 30px 20px;
      font-size: 1.8em;
      font-weight: bold;
      border-bottom: 2px solid #eee;
      position: relative;
    }
    header::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: #ccc;
      border-radius: 2px;
    }
    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    .decor {
      border-top: 1px solid #ddd;
      margin: 30px 0;
      position: relative;
    }
    .decor::before {
      content: "◆";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #bbb;
      background: #fff;
      padding: 0 5px;
    }
    p {
      margin-bottom: 20px;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      border-top: 2px solid #eee;
      margin-top: 40px;
      position: relative;
    }
    footer::before {
      content: "—";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #bbb;
      background: #fff;
      padding: 0 5px;
    }
  </style>
</head>
<body>
  <header>
    CONTENT STRATEGY OPTIMIZATION
  </header>
  <main>
    <p>
